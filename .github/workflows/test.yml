# .github/workflows/test.yml
#
# Runs the full test suite on every push and pull request.
# Critically, includes the multi-tenancy isolation test suite.
# If this fails — block the merge.

name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          SECRET: test_secret_at_least_16_chars_long_for_signed_url_tests
          SIGNED_URL_SECRET: test_signed_url_secret_for_ci_runs_minimum_32_chars
