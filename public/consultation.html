<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocPats · AI Консультация</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap");

      :root {
        --bg: #060b12;
        --bg2: #0d1520;
        --bg3: #111d2b;
        --border: #182335;
        --border2: #1e2f45;
        --accent: #00c4e0;
        --accent-dim: rgba(0, 196, 224, 0.1);
        --purple: #7c60f0;
        --text: #dde5f0;
        --text2: #7a96b5;
        --text3: #3d5a7a;
        --green: #0dd990;
        --red: #f04060;
        --gold: #f0b840;
        --sans: "DM Sans", sans-serif;
        --serif: "Cormorant Garamond", serif;
        --mono: "JetBrains Mono", monospace;
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        font-size: 15px;
        line-height: 1.6;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 196, 224, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 196, 224, 0.025) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
        z-index: 0;
      }
      .screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          opacity 0.35s ease,
          transform 0.35s ease;
      }
      .screen.hidden {
        opacity: 0;
        pointer-events: none;
        transform: scale(0.98);
      }

      /* LANG SWITCHER */
      .lang-bar {
        position: fixed;
        top: 14px;
        right: 20px;
        z-index: 300;
        display: flex;
        gap: 6px;
      }
      .lang-btn {
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 11px;
        font-family: var(--mono);
        cursor: pointer;
        border: 1px solid var(--border2);
        background: var(--bg3);
        color: var(--text2);
        transition: all 0.15s;
        letter-spacing: 0.05em;
      }
      .lang-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .lang-btn.active {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }

      /* WELCOME */
      #welcome {
        z-index: 10;
        padding: 20px;
        flex-direction: column;
      }
      .welcome-card {
        background: var(--bg2);
        border: 1px solid var(--border2);
        border-radius: 20px;
        padding: 52px 60px;
        max-width: 540px;
        width: 100%;
        text-align: center;
        box-shadow:
          0 32px 80px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(0, 196, 224, 0.08);
      }
      .logo-row {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
      }
      .logo-icon {
        width: 44px;
        height: 44px;
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--purple) 100%
        );
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
      }
      .logo-name {
        font-family: var(--serif);
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .logo-name em {
        color: var(--accent);
        font-style: normal;
      }
      .welcome-title {
        font-family: var(--serif);
        font-size: 40px;
        font-weight: 700;
        line-height: 1.12;
        letter-spacing: -0.01em;
        margin-bottom: 14px;
      }
      .welcome-title span {
        color: var(--accent);
      }
      .welcome-sub {
        color: var(--text2);
        font-size: 14px;
        line-height: 1.65;
        max-width: 380px;
        margin: 0 auto 28px;
      }
      .pills-row {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 28px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 20px;
        padding: 5px 13px;
        font-size: 12px;
        color: var(--text2);
        font-family: var(--mono);
      }
      .pill-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .pill-dot.green {
        background: var(--green);
        box-shadow: 0 0 6px var(--green);
      }
      .pill-dot.gold {
        background: var(--gold);
      }
      .pill-dot.dim {
        background: var(--text3);
      }
      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, var(--accent) 0%, #0090ff 100%);
        color: #000;
        font-weight: 600;
        font-size: 15px;
        padding: 14px 32px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-family: var(--sans);
        letter-spacing: 0.01em;
        transition: all 0.2s;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(0, 196, 224, 0.4);
      }
      .btn-primary:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      .btn-ghost {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: transparent;
        border: 1px solid var(--border2);
        color: var(--text2);
        font-size: 13px;
        padding: 9px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-family: var(--sans);
        transition: all 0.2s;
        margin-top: 10px;
      }
      .btn-ghost:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }
      .btn-ghost.authed {
        border-color: var(--green);
        color: var(--green);
      }
      .welcome-disclaimer {
        margin-top: 22px;
        font-size: 11px;
        color: var(--text3);
        line-height: 1.55;
        padding: 0 8px;
      }

      /* INFO */
      #info-screen {
        z-index: 10;
        padding: 20px;
      }
      .info-card {
        background: var(--bg2);
        border: 1px solid var(--border2);
        border-radius: 16px;
        padding: 40px 44px;
        max-width: 460px;
        width: 100%;
      }
      .info-title {
        font-family: var(--serif);
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .info-sub {
        font-size: 13px;
        color: var(--text2);
        margin-bottom: 26px;
      }
      .fg {
        margin-bottom: 16px;
      }
      .fg label {
        display: block;
        font-size: 11px;
        font-weight: 500;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 6px;
        font-family: var(--mono);
      }
      .fg input,
      .fg select {
        width: 100%;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 8px;
        padding: 10px 13px;
        color: var(--text);
        font-size: 14px;
        font-family: var(--sans);
        outline: none;
        transition: border-color 0.2s;
      }
      .fg input:focus,
      .fg select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }
      .fg select option {
        background: #0d1520;
      }
      .gender-row {
        display: flex;
        gap: 8px;
      }
      .g-btn {
        flex: 1;
        padding: 9px;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 8px;
        text-align: center;
        cursor: pointer;
        font-size: 13px;
        color: var(--text2);
        transition: all 0.15s;
        user-select: none;
      }
      .g-btn.sel {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }
      .btn-row {
        display: flex;
        gap: 10px;
        margin-top: 24px;
      }

      /* CHAT */
      #chat-screen {
        z-index: 10;
        flex-direction: column;
        align-items: stretch;
        padding: 0;
      }
      .chat-top {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 13px 20px;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .chat-top-logo {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .chat-top-logo .logo-icon {
        width: 32px;
        height: 32px;
        font-size: 15px;
        border-radius: 8px;
      }
      .chat-top-logo .logo-name {
        font-size: 17px;
      }
      .chat-top-info {
        flex: 1;
      }
      .chat-top-title {
        font-size: 13px;
        font-weight: 600;
      }
      .chat-top-sub {
        font-size: 11px;
        color: var(--text3);
        font-family: var(--mono);
      }
      .session-chip {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 11px;
        color: var(--text2);
        font-family: var(--mono);
      }
      .live-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 5px var(--green);
        animation: livepulse 2s infinite;
      }
      @keyframes livepulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      .msgs {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        scrollbar-width: thin;
        scrollbar-color: var(--border2) transparent;
      }
      .msgs::-webkit-scrollbar {
        width: 3px;
      }
      .msgs::-webkit-scrollbar-thumb {
        background: var(--border2);
      }
      .msg {
        display: flex;
        gap: 10px;
        animation: msgIn 0.3s ease;
      }
      @keyframes msgIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .msg.user {
        flex-direction: row-reverse;
      }
      .av {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-weight: 600;
      }
      .av.ai {
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--purple) 100%
        );
        color: #000;
        font-size: 15px;
      }
      .av.usr {
        background: var(--bg3);
        border: 1px solid var(--border2);
        color: var(--text2);
        font-family: var(--mono);
        font-size: 12px;
      }
      .bubble {
        max-width: 72%;
        padding: 12px 16px;
        font-size: 14px;
        line-height: 1.65;
        border-radius: 12px;
      }
      .msg.ai .bubble {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 12px 12px 12px 3px;
      }
      .msg.user .bubble {
        background: linear-gradient(135deg, #003d99 0%, #0060cc 100%);
        border-radius: 12px 12px 3px 12px;
        color: #fff;
      }
      .bmeta {
        font-size: 10px;
        color: var(--text3);
        margin-top: 4px;
        font-family: var(--mono);
      }
      .msg.user .bmeta {
        text-align: right;
        color: rgba(255, 255, 255, 0.4);
      }
      .typing-row {
        display: flex;
        gap: 10px;
      }
      .typing-bub {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 12px 12px 12px 3px;
        padding: 12px 16px;
        display: flex;
        gap: 5px;
        align-items: center;
      }
      .typing-bub span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--text3);
        animation: bonce 1.3s infinite;
      }
      .typing-bub span:nth-child(2) {
        animation-delay: 0.18s;
      }
      .typing-bub span:nth-child(3) {
        animation-delay: 0.36s;
      }
      @keyframes bonce {
        0%,
        80%,
        100% {
          transform: scale(1);
          opacity: 0.5;
        }
        40% {
          transform: scale(1.4);
          opacity: 1;
        }
      }
      .attach-bar {
        display: flex;
        gap: 6px;
        padding: 8px 20px;
        background: var(--bg2);
        border-top: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .a-chip {
        display: flex;
        align-items: center;
        gap: 5px;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 5px;
        padding: 3px 8px;
        font-size: 11px;
        color: var(--text2);
        font-family: var(--mono);
      }
      .a-chip button {
        background: none;
        border: none;
        color: var(--text3);
        cursor: pointer;
        padding: 0 0 0 3px;
        font-size: 11px;
        line-height: 1;
      }
      .a-chip button:hover {
        color: var(--red);
      }
      .epic-bar {
        display: none;
        align-items: center;
        gap: 10px;
        padding: 9px 20px;
        background: linear-gradient(
          90deg,
          rgba(0, 196, 224, 0.04) 0%,
          transparent 100%
        );
        border-top: 1px solid rgba(0, 196, 224, 0.12);
      }
      .epic-bar.show {
        display: flex;
      }
      .epic-note {
        font-size: 12px;
        color: var(--text3);
      }
      .btn-epic {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(0, 196, 224, 0.12);
        border: 1px solid rgba(0, 196, 224, 0.25);
        color: var(--accent);
        padding: 6px 16px;
        border-radius: 7px;
        font-size: 13px;
        cursor: pointer;
        font-family: var(--sans);
        font-weight: 500;
        transition: all 0.2s;
      }
      .btn-epic:hover {
        background: rgba(0, 196, 224, 0.2);
      }
      .btn-epic:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .input-area {
        padding: 12px 16px;
        background: var(--bg2);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      .input-row {
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }
      .file-btn {
        width: 40px;
        height: 40px;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--text2);
        font-size: 16px;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .file-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }
      textarea {
        flex: 1;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 9px;
        padding: 10px 13px;
        color: var(--text);
        font-size: 14px;
        font-family: var(--sans);
        outline: none;
        resize: none;
        min-height: 42px;
        max-height: 110px;
        line-height: 1.5;
        transition: border-color 0.2s;
      }
      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }
      .send-btn {
        width: 42px;
        height: 42px;
        background: linear-gradient(135deg, var(--accent) 0%, #0090ff 100%);
        border: none;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 17px;
        color: #000;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .send-btn:hover {
        box-shadow: 0 4px 14px rgba(0, 196, 224, 0.4);
        transform: scale(1.04);
      }
      .send-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      /* OVERLAY */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.82);
        backdrop-filter: blur(10px);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      .overlay.show {
        opacity: 1;
        pointer-events: all;
      }
      .modal {
        background: var(--bg2);
        border: 1px solid var(--border2);
        border-radius: 16px;
        max-width: 760px;
        width: 100%;
        max-height: 90vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transform: translateY(16px);
        transition: transform 0.3s;
      }
      .overlay.show .modal {
        transform: none;
      }
      .modal-head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 16px 22px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .modal-head h3 {
        font-family: var(--serif);
        font-size: 20px;
        font-weight: 600;
        flex: 1;
      }
      .btn-print {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: linear-gradient(135deg, var(--accent) 0%, #0090ff 100%);
        color: #000;
        font-weight: 600;
        font-size: 12px;
        padding: 7px 16px;
        border-radius: 7px;
        border: none;
        cursor: pointer;
        font-family: var(--sans);
        transition: all 0.2s;
      }
      .btn-print:hover {
        box-shadow: 0 4px 12px rgba(0, 196, 224, 0.4);
      }
      .icon-close {
        width: 34px;
        height: 34px;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--text2);
        font-size: 13px;
        transition: all 0.2s;
      }
      .icon-close:hover {
        color: var(--red);
        border-color: var(--red);
      }
      .modal-body {
        overflow-y: auto;
        flex: 1;
        scrollbar-width: thin;
        scrollbar-color: var(--border2) transparent;
      }
      .modal-body::-webkit-scrollbar {
        width: 3px;
      }
      .modal-body::-webkit-scrollbar-thumb {
        background: var(--border2);
      }

      /* EPICRISIS */
      .epic-doc {
        padding: 34px 38px;
      }
      .epic-letterhead {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding-bottom: 18px;
        border-bottom: 2px solid var(--border2);
        margin-bottom: 22px;
      }
      .el-brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .el-icon {
        width: 48px;
        height: 48px;
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--purple) 100%
        );
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
      }
      .el-name {
        font-family: var(--serif);
        font-size: 30px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .el-name em {
        color: var(--accent);
        font-style: normal;
      }
      .el-tagline {
        font-size: 11px;
        color: var(--text3);
        font-family: var(--mono);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-top: 2px;
      }
      .el-right {
        text-align: right;
      }
      .el-ref {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text3);
        letter-spacing: 0.05em;
      }
      .el-date {
        font-size: 13px;
        color: var(--text2);
        margin-top: 3px;
      }
      .epic-headline {
        font-family: var(--serif);
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 2px;
      }
      .epic-subline {
        font-size: 11px;
        color: var(--text3);
        font-family: var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.09em;
        margin-bottom: 16px;
      }
      .urgency-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 14px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        font-family: var(--mono);
        margin-bottom: 18px;
      }
      .urgency-tag.routine {
        background: rgba(13, 217, 144, 0.12);
        color: var(--green);
        border: 1px solid rgba(13, 217, 144, 0.25);
      }
      .urgency-tag.urgent {
        background: rgba(240, 184, 64, 0.12);
        color: var(--gold);

        font-size: 12px;

        border-radius: 8px;
        padding: 13px 16px;
        font-size: 13px;
        line-height: 1.7;
        color: var(--text2);

      .soap-body strong {
        color: var(--text);

        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-top: 6px;

        content: "→";
        color: var(--accent);
        margin-right: 7px;
        font-size: 11px;
      }
      .divider {
        height: 1px;
        background: var(--border);
        margin: 22px 0;
      }
      .doc-section-title {
        font-family: var(--serif);
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 3px;

        font-size: 11px;
        color: var(--text3);

        gap: 12px;

        padding: 13px 16px;
        margin-bottom: 8px;

        transition: all 0.2s;

        border-color: var(--accent);
        background: var(--accent-dim);
      }

        width: 42px;
        height: 42px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
      }
      .dr-info {
        flex: 1;
      }
      .dr-name {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 1px;
      }
      .dr-detail {
        font-size: 12px;
        color: var(--text2);
      }
      .dr-right {
        text-align: right;
      }
      .dr-rating {
        font-size: 13px;
        font-weight: 600;
        color: var(--gold);
      }
      .dr-avail {
        font-size: 11px;
        color: var(--green);

      .dr-price {

        color: var(--text2);

        font-size: 11px;
        color: var(--text3);
        line-height: 1.6;
      }

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 40px;
        gap: 14px;
      }
      .spinner {
        width: 38px;
        height: 38px;
        border: 3px solid var(--border2);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spin-label {
        font-size: 12px;
        color: var(--text2);
        font-family: var(--mono);
      }
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: var(--bg2);
        border: 1px solid rgba(240, 64, 96, 0.4);
        color: var(--red);
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 13px;
        font-family: var(--mono);
        z-index: 999;
        transition: transform 0.3s;
        white-space: nowrap;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);

        padding: 16px 12px;

      }

        font-size: 10px;
        color: var(--text3);

        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 5px;
      }
      .price-val {
        font-family: var(--serif);
        font-size: 26px;
        font-weight: 600;
        margin-bottom: 3px;
      }
      .price-val sub {
        font-family: var(--sans);
        font-size: 12px;
        color: var(--text3);
      }
      .price-note {
        font-size: 11px;
        color: var(--text3);
      }

      /* RTL для арабского */
      html[lang="ar"] {
        direction: rtl;
      }
      html[lang="ar"] .msg.user {
        flex-direction: row;
      }
      html[lang="ar"] .msg.ai {
        flex-direction: row-reverse;
      }
      html[lang="ar"] .msg.user .bubble {
        border-radius: 12px 12px 12px 3px;
      }
      html[lang="ar"] .msg.ai .bubble {
        border-radius: 12px 12px 3px 12px;
      }
      html[lang="ar"] .btn-epic {
        margin-left: 0;
        margin-right: auto;
      }
      html[lang="ar"] .soap-body li::before {
        content: "←";
      }

          height: auto !important;

        #chat-screen,
        #limit-overlay,
        .toast,

          display: none !important;

          transform: none !important;

        (location.hostname === "localhost" || location.hostname === "127.0.0.1"
          ? "http://localhost:11000"
          : "https://backend.docpats.com");
      let LANG = localStorage.getItem("dp_lang") || "ru";

      const S = {
        auth: false,
        guestId: guestId(),
        status: null, // ← null пока init() не отработал
        epicrisisStatus: null,
        gender: null,

      // ─── GUEST LOCAL STATS (ГЛОБАЛЬНО) ───
      function getGuestStats() {
        try {
          return JSON.parse(localStorage.getItem("dp_guest_stats") || "{}");
        } catch {
          return {};
        }
      }
      function saveGuestStats(stats) {
        localStorage.setItem("dp_guest_stats", JSON.stringify(stats));
      }
      function incrementGuestStat(key) {
        const stats = getGuestStats();
        stats[key] = (stats[key] || 0) + 1;
        saveGuestStats(stats);
        return stats[key];
      }
      function applyLocalStats() {
        if (S.auth) return;
        const local = getGuestStats();
        const localCons = local.consultations || 0;
        const localEpic = local.epicrises || 0;

        if (S.epicrisisStatus && localEpic > 0) {
          S.epicrisisStatus.used = Math.max(S.epicrisisStatus.used, localEpic);
          S.epicrisisStatus.remaining = Math.max(
            0,
            S.epicrisisStatus.max - S.epicrisisStatus.used,
          );
        }
      }

      function guestId() {
        let id = localStorage.getItem("dp_gid");
        if (!id) {
          id =
            "g_" +
            Date.now().toString(36) +
            Math.random().toString(36).slice(2);
          localStorage.setItem("dp_gid", id);
        }
        return id;
      }

      function t() {
        return LANGS[LANG];

        localStorage.setItem("dp_lang", lang);
        document.documentElement.lang = lang;
        document.documentElement.dir = LANGS[lang].dir;

          .querySelectorAll(".lang-btn")
          .forEach((b) =>

        applyTranslations();

      // ═══════════════════════════════════════════
      // HTTP
      // ═══════════════════════════════════════════
      async function api(method, path, body) {
        const opts = {
          method,
          credentials: "include",
          headers: {
            "Content-Type": "application/json",
            "x-guest-id": S.guestId,
          },
        };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(BASE + path, opts);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw { status: res.status, ...data };
        return data;
      }

      // ═══════════════════════════════════════════
      // INIT
      // ═══════════════════════════════════════════
      async function init(preloadedStatus = null) {
        try {
          const data =
            preloadedStatus ||
            (await api("GET", "/api/consultation/session-status"));

          // ── Дебаг: смотрим что реально возвращает сервер ──
          console.log(
            "[DocPats] session-status response:",
            JSON.stringify(data, null, 2),
          );

          // ── Читаем лимиты — пробуем все возможные ключи ──
          const guestConsLimit =
            data.limits?.consultationGuest ||
            data.limits?.consultationGuestLimit ||
            data.limits?.guest?.consultations ||
            data.consultations?.max ||
            2; // ← фолбэк = 2 (по .env)

          const guestEpicLimit =
            data.limits?.epicrisisGuest ||
            data.limits?.epicrisisGuestLimit ||
            data.limits?.guest?.epicrises ||
            data.epicrises?.max ||
            2; // ← фолбэк = 2 (по .env)

          // ── Консультации ──
          if (
            data.consultations &&
            typeof data.consultations.remaining === "number"
          ) {
            S.status = data.consultations;
          } else {
            S.status = {
              used: 0,
              remaining: guestConsLimit,
              max: guestConsLimit,
            };
          }

          // ── Эпикризы ──
          if (data.epicrises && typeof data.epicrises.remaining === "number") {
            S.epicrisisStatus = data.epicrises;
          } else {
            S.epicrisisStatus = {
              used: 0,
              remaining: guestEpicLimit,
              max: guestEpicLimit,
            };
          }

          // ── Для гостя: мержим с localStorage (защита от потери cookie в iframe) ──
          if (!S.auth) {
            const local = getGuestStats();
            const localConsUsed = local.consultations || 0;
            const localEpicUsed = local.epicrises || 0;

            if (localEpicUsed > S.epicrisisStatus.used) {
              S.epicrisisStatus.used = localEpicUsed;
              S.epicrisisStatus.remaining = Math.max(
                0,
                S.epicrisisStatus.max - localEpicUsed,
              );
            }
          }

          // ── Авторизация ──
          if (data.isAuthenticated && !S.auth) {
            S.auth = true;
            IS_AUTH = true;
            const authBtn = document.getElementById("auth-btn");
            if (authBtn) {
              authBtn.classList.add("authed");
              authBtn.textContent = t().wt_authed;
            }
          }
        } catch (err) {
          console.error("[DocPats] init error:", err);
          if (err instanceof TypeError && err.message === "Failed to fetch") {
            // Сервер недоступен — не трогаем S.status если уже установлен
            if (!S.status) S.status = { used: 0, remaining: 2, max: 2 };
            if (!S.epicrisisStatus)
              S.epicrisisStatus = { used: 0, remaining: 2, max: 2 };
            // НЕ вызываем applyLocalStats — localStorage может быть устаревшим
          } else {
            S.status = { used: 0, remaining: 2, max: 2 };
            S.epicrisisStatus = { used: 0, remaining: 2, max: 2 };
            applyLocalStats();
          }
        }
        renderPills();
      }
      function renderPills() {
        const L = t();
        const hint = document.getElementById("limit-hint");
        const btn = document.getElementById("start-btn");

        if (!S.epicrisisStatus || !S.status) {
          document.getElementById("pills").innerHTML =
            `<div class="pill"><span class="pill-dot dim"></span>${L.wt_loading}</div>`;
          btn.disabled = true;
          return;
        }

        const { remaining, max } = S.epicrisisStatus;
        const cls = remaining > 1 ? "green" : remaining === 1 ? "gold" : "dim";
        const lbl =
          remaining > 0 ? L.pill_epicrises(remaining, max) : L.pill_epic_done;

        const cRem = S.status?.remaining ?? 0;
        const cMax = S.status?.max ?? 0;
        const cCls = cRem > cMax * 0.5 ? "green" : cRem > 0 ? "gold" : "dim";

        document.getElementById("pills").innerHTML =
          `<div class="pill"><span class="pill-dot ${cCls}"></span>${L.pill_consultations(cRem, cMax)}</div>` +
          `<div class="pill"><span class="pill-dot ${cls}"></span>${lbl}</div>`;

        if (S.status.remaining <= 0 && !S.auth) {
          // Гость + лимит исчерпан — кнопка неактивна
          btn.disabled = true;
          btn.textContent = "Лимит исчерпан — войдите для продолжения";
          btn.style.opacity = "0.5";
          btn.style.cursor = "not-allowed";
          btn.onclick = null;
          if (!hint) {
            const h = document.createElement("div");
            h.id = "limit-hint";
            h.style.cssText =
              "font-size:12px;color:var(--text3);margin-top:10px;line-height:1.5;";
            h.textContent =
              "Лимит исчерпан. Для увеличения лимита авторизуйтесь.";
            btn.parentNode.insertBefore(h, btn.nextSibling);
          }
        } else if (S.status.remaining <= 0 && S.auth) {
          // Авторизованный + лимит исчерпан — кнопка ведёт на тарифы
          btn.disabled = false;
          btn.style.opacity = "";
          btn.style.cursor = "";
          btn.textContent = L.btn_pricing;
          btn.onclick = function () {
            window.top.location.href = "/pricing";
          };
          if (hint) hint.remove();
        } else {
          // Лимит есть — обычная кнопка
          btn.disabled = false;
          btn.style.opacity = "";
          btn.style.cursor = "";
          btn.textContent = L.wt_start;
          btn.onclick = function () {
            goStart();
          };
          if (hint) hint.remove();
        }
      }

      // ═══════════════════════════════════════════
      // CHAT
      // ═══════════════════════════════════════════
      function appendMsg(role, text) {
        const area = document.getElementById("msgs");
        const ini = role === "ai" ? "⚕" : S.patient.name[0].toUpperCase();
        const time = new Date().toLocaleTimeString(
          LANG === "ar" ? "ar" : "ru",
          { hour: "2-digit", minute: "2-digit" },
        );
        const d = document.createElement("div");
        d.className = `msg ${role}`;
        d.innerHTML = `<div class="av ${role === "ai" ? "ai" : "usr"}">${ini}</div><div><div class="bubble">${text.replace(/\n/g, "<br>")}</div><div class="bmeta">${time}</div></div>`;
        area.appendChild(d);
        area.scrollTop = area.scrollHeight;
      }

      function showTyping() {
        const area = document.getElementById("msgs");
        const d = document.createElement("div");
        d.id = "typing";
        d.className = "typing-row";
        d.innerHTML = `<div class="av ai">⚕</div><div class="typing-bub"><span></span><span></span><span></span></div>`;
        area.appendChild(d);
        area.scrollTop = area.scrollHeight;
      }
      function hideTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
      }

      function onKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      }
      function autoH(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 110) + "px";
      }

      async function send() {
        const inp = document.getElementById("msg-in");
        const txt = inp.value.trim();
        if (!txt || S.busy) return;
        appendMsg("user", txt);
        S.msgs.push({ role: "user", content: txt });
        inp.value = "";
        inp.style.height = "auto";
        S.exchanges++;
        await backendChat(S.msgs);
      }

      async function backendChat(messages, isGreeting = false) {
        const L = t();
        S.busy = true;
        document.getElementById("send-btn").disabled = true;
        showTyping();
        try {
          const data = await api("POST", "/api/consultation/message", {
            messages,
            patientInfo: S.patient,
            isGreeting,
          });

          // Синхронизируем счётчик с сервером (приходит только после первого сообщения)
          if (typeof data.remaining === "number") {
            S.status.remaining = data.remaining;
            S.status.max = data.max || S.status.max;
            S.status.used = S.status.max - data.remaining;
            renderPills();
          }
          hideTyping();
          const reply = data.reply;
          appendMsg("ai", reply);
          if (isGreeting) {
            S.msgs = [
              { role: "user", content: messages[0].content },
              { role: "assistant", content: reply },
            ];
          } else {
            S.msgs.push({ role: "assistant", content: reply });
          }
          if (S.exchanges >= 4)
            document.getElementById("epic-bar").classList.add("show");
        } catch (e) {
          hideTyping();
          if (e.status === 503 && e.error === "AI_UNAVAILABLE") {
            appendMsg(
              "ai",
              "🛠 Сервис временно недоступен. Мы уже работаем над восстановлением.",
            );
          } else if (e.status === 429 && e.error === "DAILY_MESSAGE_LIMIT") {
            appendMsg("ai", "Вы достигли дневного лимита сообщений...");
          } else {
            appendMsg("ai", e.status === 429 ? L.err_limit : L.err_tech);
          }
          showToast(e.error || L.err_tech);
        }
        S.busy = false;
        document.getElementById("send-btn").disabled = false;
      }

      // ═══════════════════════════════════════════
      // FILES
      // ═══════════════════════════════════════════
      function onFile(e) {
        const L = t();
        Array.from(e.target.files).forEach((f) => {
          if (S.files.length >= 5) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            S.files.push({
              name: f.name,
              data: ev.target.result,
              type: f.type,
            });
            renderFiles();
            const note = L.file_note(f.name);
            appendMsg("ai", note);
            S.msgs.push({ role: "assistant", content: note });
          };
          reader.readAsDataURL(f);
        });
        e.target.value = "";
      }

      function renderFiles() {
        const bar = document.getElementById("attach-bar");
        if (!S.files.length) {
          bar.style.display = "none";
          return;
        }
        bar.style.display = "flex";
        bar.innerHTML = S.files
          .map(
            (f, i) =>
              `<div class="a-chip">📎 ${f.name.length > 18 ? f.name.slice(0, 16) + "…" : f.name}<button onclick="rmFile(${i})">✕</button></div>`,
          )
          .join("");
      }
      function rmFile(i) {
        S.files.splice(i, 1);
        renderFiles();

      async function genEpicrisis() {
        const L = t();
        document.getElementById("epic-btn").disabled = true;
        document.getElementById("epic-overlay").classList.add("show");
        document.getElementById("epic-body").innerHTML =
          `<div class="loading-view"><div class="spinner"></div><div class="spin-label">${L.em_loading}</div></div>`;
        try {
          const data = await api("POST", "/api/consultation/epicrisis", {
            messages: S.msgs,
            patientInfo: S.patient,
          });

          // Обновляем счётчик эпикризов
          if (data.epicrisesRemaining !== undefined) {
            S.epicrisisStatus.remaining = data.epicrisesRemaining;
            S.epicrisisStatus.used =
              S.epicrisisStatus.max - data.epicrisesRemaining;
          } else {
            S.epicrisisStatus.remaining = Math.max(
              0,
              S.epicrisisStatus.remaining - 1,
            );
            S.epicrisisStatus.used += 1;
          }

          // Для гостя — сохраняем локально
          if (!S.auth) {
            incrementGuestStat("epicrises");
          }

          renderPills(); // ← обновляем пиллы
          renderEpicrisis(data.epicrisis, data.doctors || []);
        } catch (e) {
          closeEpic();
          if (e.status === 429) {
            showLimit();
            return;
          }
          document.getElementById("epic-body").innerHTML =
            `<div class="loading-view"><div style="font-size:30px">⚠</div><div class="spin-label">${L.em_error}</div><button class="btn-ghost" onclick="closeEpic()" style="margin-top:8px">${L.em_close}</button></div>`;
          showToast(e.error || L.err_gen);
        }
        document.getElementById("epic-btn").disabled = false;

      ${d.recommendations?.length ? `<strong>${L.recs}</strong><ul style="margin-bottom:12px">${d.recommendations.map((r) => `<li>${r}</li>`).join("")}</ul>` : ""}
      ${d.additionalTests?.length ? `<strong>${L.tests}</strong><ul style="margin-bottom:12px">${d.additionalTests.map((t) => `<li>${t}</li>`).join("")}</ul>` : ""}
      ${d.lifestyleAdvice ? `<strong>${L.lifestyle}</strong><p style="margin-top:5px">${d.lifestyleAdvice}</p>` : ""}
    </div>
  </div>
  <div class="divider"></div>
  <div class="doc-section-title">${L.docs_title}</div>
  <div class="doc-section-sub">${L.docs_sub}</div>
  ${drHtml}
  <div class="epic-disclaimer">${L.disclaimer(date, ref)}</div>
</div>`;
      }

      // ═══════════════════════════════════════════
      // HELPERS
      // ═══════════════════════════════════════════
      function closeEpic() {
        document.getElementById("epic-overlay").classList.remove("show");
      }
      function closeLimit() {
        document.getElementById("limit-overlay").classList.remove("show");
      }
      function printEpicrisis() {
        setTimeout(() => window.print(), 100);
      }

      function showLimit() {
        const L = t();
        const regBtn = document.getElementById("lm-register");
        const loginBtn = document.getElementById("lm-login");

        if (S.auth) {
          // Авторизован + лимит исчерпан → тарифы
          document.getElementById("lm-title").textContent = L.lm_title;
          document.getElementById("limit-txt").textContent = L.lm_auth;
          regBtn.textContent =
            LANG === "ar"
              ? "← اختر الخطة"
              : LANG === "az"
                ? "Tarif seç →"
                : LANG === "tr"
                  ? "Plan seç →"
                  : LANG === "en"
                    ? "Choose a plan →"
                    : "Выбрать тариф →";
          regBtn.onclick = () => {
            window.top.location.href = "/pricing";
          };
          if (loginBtn) loginBtn.style.display = "none";
        } else {
          // Гость → регистрация / вход
          document.getElementById("lm-title").textContent =
            LANG === "ar"
              ? "سجّل أو سجّل دخولك"
              : LANG === "az"
                ? "Qeydiyyat / Giriş"
                : LANG === "tr"
                  ? "Kayıt / Giriş"
                  : LANG === "en"
                    ? "Sign up or Log in"
                    : "Нужна авторизация";
          document.getElementById("limit-txt").textContent =
            LANG === "ar"
              ? "سجّل للحصول على 5 استشارات مجانية، أو سجّل دخولك إذا كان لديك حساب."
              : LANG === "az"
                ? "5 pulsuz konsultasiya üçün qeydiyyatdan keçin və ya hesabınıza daxil olun."
                : LANG === "tr"
                  ? "5 ücretsiz danışma için kayıt olun veya hesabınıza giriş yapın."
                  : LANG === "en"
                    ? "Register to get 5 free consultations, or log in to your account."
                    : "Зарегистрируйтесь, чтобы получить 5 бесплатных консультаций, или войдите в аккаунт.";
          regBtn.textContent =
            LANG === "ar"
              ? "← التسجيل"
              : LANG === "az"
                ? "Qeydiyyat →"
                : LANG === "tr"
                  ? "Kayıt ol →"
                  : LANG === "en"
                    ? "Register →"
                    : "Зарегистрироваться →";
          regBtn.onclick = () => {
            window.top.location.href = "/registration";
          };
          if (loginBtn) {
            loginBtn.style.display = "flex";
            loginBtn.textContent =
              LANG === "ar"
                ? "تسجيل الدخول"
                : LANG === "az"
                  ? "Daxil ol"
                  : LANG === "tr"
                    ? "Giriş yap"
                    : LANG === "en"
                      ? "Log in"
                      : "Войти в аккаунт";
            loginBtn.onclick = () => {
              window.top.location.href = "/login";
            };
          }
        }

        document.getElementById("limit-overlay").classList.add("show");
      }

      let toastT;
      function showToast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        clearTimeout(toastT);
        toastT = setTimeout(() => el.classList.remove("show"), 4000);
      }

      // ═══════════════════════════════════════════
      // BOOT
      // ═══════════════════════════════════════════
      // ═══════════════════════════════════════════
      // BOOT
      function boot() {
        BASE = window.__API_BASE__ || BASE;
        setLang(LANG);
        setTimeout(() => {
          if (!_baseReceived && !S.status) {
            // ← добавь !S.status
            init();
          }
        }, 500);
      }

      let IS_AUTH = false;
      let _baseReceived = false;
      let _lastAuthState = null;

      window.addEventListener("message", function (event) {
        if (!event.data || event.data.apiBase === undefined) return;

        if (event.data.apiBase) {
          BASE = event.data.apiBase;
        }

        const newAuthState = !!event.data.isAuth;

        if (newAuthState !== _lastAuthState) {
          _lastAuthState = newAuthState;
          IS_AUTH = newAuthState;
          S.auth = newAuthState;

          const btn = document.getElementById("auth-btn");
          if (btn) {
            if (newAuthState) {
              btn.classList.add("authed");
              btn.textContent = t().wt_authed;
            } else {
              btn.classList.remove("authed");
              btn.textContent = t().wt_auth;
            }
          }
          applyTranslations();

          // Передаём готовый статус из React-компонента (fetched через прокси)
          init(event.data.sessionStatus || null);
        } else if (!_baseReceived) {
          init(event.data.sessionStatus || null);
        }

        _baseReceived = true;
      });

      function handleAuthClick() {
        if (IS_AUTH) {
          // Уже авторизован — показываем лимит/тарифы
          showLimit();
          return;
        }
        window.top.location.href = "/login";
      }
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", boot);
      } else {
        boot();
      }
    </script>
  </body>
</html>
